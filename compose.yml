  #     - ./benchmarks:/data/benchmarks
  #   networks:
  #     - net
  #   environment:
  #     - PGNEAREST_DB_HOST=db
  #     - PGNEAREST_DB_USER=cities
  #     - PGNEAREST_DB_PASSWORD=dummycipassword
  #     - PGNEAREST_DB_NAME=cities
  #   restart: "no"
  #   user: root
  #   command: "python /data/benchmarks/benchmark.py"

  generator:
    image: "ghcr.io/hotosm/pg-nearest-city:${TAG_OVERRIDE:-dev}"
    build:
      target: dev
    profiles: [data-generation]
    container_name: pg-nearest-city-generator
    depends_on:
      db:
        condition: service_healthy
    volumes:
      # Mount project config
      - ./pyproject.toml:/data/pyproject.toml:ro
      # Mount local package
      - ./pg_nearest_city:/opt/python/lib/python3.10/site-packages/pg_nearest_city:ro
      # Mount cache directory for downloaded source datasets
      - ./cache:/data/cache
      # Mount output directory (where generated files will be saved)
      - ./output:/data/output
    networks:
      - net
    environment:
      - PGNEAREST_DB_HOST=db
      - PGNEAREST_DB_PORT=5432
      - PGNEAREST_DB_USER=cities
      - PGNEAREST_DB_PASSWORD=dummycipassword
      - PGNEAREST_DB_NAME=cities
    restart: "no"
    user: root
    command: >-
      pgnearest-load
      --boundary-source naturalearth
      --db-host db
      --db-port 5432
      --db-name cities
      --db-user cities
      --db-password dummycipassword
      --cache-dir /data/cache
      --output-dir /data/output
